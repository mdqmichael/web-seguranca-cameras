    <style>
        :root {
            /* PALETA HORUS DISTRIBUIDORA */
            --horus-orange: #FF6600;
            --horus-orange-dark: #E65C00;
            --horus-dark: #333333;
            --horus-gray-light: #f4f4f4;
            --white: #ffffff;
            /* FONTES NATIVAS DO SISTEMA (100% OFFLINE) */
            --font-cursive: 'Brush Script MT', 'Lucida Handwriting', cursive;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--horus-gray-light);
            margin: 0;
            padding: 0;
            color: var(--horus-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CABEÇALHO COMPACTO */
        header {
            width: 100%;
            background: linear-gradient(135deg, var(--horus-orange), var(--horus-orange-dark));
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            font-family: var(--font-cursive);
            font-size: 50px;
            margin: 0;
            font-weight: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 0.9rem;
            margin: 5px 0 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            opacity: 0.9;
        }

        /* CONTAINER DOS CARDS */
        .container {
            width: 100%;
            max-width: 500px; /* Largura ideal para WhatsApp/Celular */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ESTILO DO CARD (Vertical) */
        .card {
            background-color: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.07);
            border: 1px solid #eee;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        /* Área da Foto */
        .card-image-box {
            width: 100%;
            height: 250px;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .card-image-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Conteúdo do Card */
        .card-content {
            padding: 20px;
        }

        .product-code {
            font-size: 11px;
            color: #999;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .product-title {
            color: var(--horus-orange);
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 15px 0;
            line-height: 1.2;
        }

        .product-desc {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }
